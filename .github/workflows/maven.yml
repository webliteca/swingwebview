name: Java CI

on: [push]

jobs:
  build-linux:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 1.8
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 8
        cache: maven
    - name: Build with Maven
      run: mvn -B -DskipTests package
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install libwebkit2gtk-4.0-dev xvfb -y
    - name: Run Unit Tests
      run: xvfb-run mvn -B test

  build-macos:

    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 1.8
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 8
        cache: maven
    - name: Build with Maven
      run: mvn -B -DskipTests package
    - name: Run Unit Tests
      run: mvn -B test

  build-windows:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 1.8
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 8
        cache: maven
    - name: Build with Maven
      run: mvn -B -DskipTests package
    - name: Run Unit Tests
      run: mvn -B test
