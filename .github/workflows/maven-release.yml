# Release workflow: build cross-platform natives, then publish to Maven Central.
#
# Uses the modern Central Publishing Maven Plugin (org.sonatype.central:central-publishing-maven-plugin).
#
# Required GitHub Secrets (provided as webliteca org-level secrets):
#   GPG_PRIVATE_KEY        - Base64-encoded GPG private key
#   GPG_PASSPHRASE         - GPG key passphrase
#   MAVEN_CENTRAL_USERNAME - Maven Central portal API token username
#   MAVEN_CENTRAL_PASSWORD - Maven Central portal API token password
#
# Release process:
#   git tag v1.0.0
#   git push origin v1.0.0

name: Release to Maven Central

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Native builds, mirroring .github/workflows/build.yml.  Each job produces
  # one platform's native lib and uploads it as native-<arch>.
  # ---------------------------------------------------------------------------
  native:
    name: native (${{ matrix.native_dir }})
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-14
            mac_arch: x86_64
            native_dir: osx_64
            lib_name: libwebview.dylib
          - os: macos-14
            mac_arch: arm64
            native_dir: osx_arm64
            lib_name: libwebview.dylib
          - os: ubuntu-24.04
            native_dir: linux_64
            lib_name: libwebview.so
          - os: ubuntu-24.04-arm
            native_dir: linux_arm64
            lib_name: libwebview.so
          - os: windows-latest
            native_dir: windows_64
            lib_name: webview.dll
            wv2_arch: x64
            vsdev_arch: x64
          - os: windows-11-arm
            native_dir: windows_arm64
            lib_name: webview.dll
            wv2_arch: arm64
            vsdev_arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: liberica
          java-version: '11'

      - name: Build macOS native (${{ matrix.mac_arch }})
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "natives/${{ matrix.native_dir }}"
          c++ \
              -arch ${{ matrix.mac_arch }} \
              -I"$JAVA_HOME/include" -I"$JAVA_HOME/include/darwin" \
              -dynamiclib \
              src_c/webview_embed.cpp \
              -o "natives/${{ matrix.native_dir }}/${{ matrix.lib_name }}" \
              -DWEBVIEW_COCOA=1 \
              -std=c++11 \
              -framework WebKit -framework Cocoa -framework QuartzCore \
              -Wl,-undefined,dynamic_lookup
          file "natives/${{ matrix.native_dir }}/${{ matrix.lib_name }}"

      - name: Install Linux deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              g++ pkg-config \
              libgtk-3-dev libwebkit2gtk-4.1-dev libx11-dev libxt-dev

      - name: Build Linux native
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "natives/${{ matrix.native_dir }}"
          if pkg-config --exists webkit2gtk-4.1; then
            WEBKIT_PKG=webkit2gtk-4.1
          else
            WEBKIT_PKG=webkit2gtk-4.0
          fi
          g++ -fPIC -std=c++11 -Wall \
              -DWEBVIEW_GTK=1 \
              -I"$JAVA_HOME/include" -I"$JAVA_HOME/include/linux" \
              -I./src_c \
              $(pkg-config --cflags gtk+-3.0 "$WEBKIT_PKG") \
              src_c/webview.c src_c/webview_embed.cpp \
              $(pkg-config --libs gtk+-3.0 "$WEBKIT_PKG") \
              -lX11 -ldl \
              -shared -o "natives/${{ matrix.native_dir }}/${{ matrix.lib_name }}"
          file "natives/${{ matrix.native_dir }}/${{ matrix.lib_name }}"

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.vsdev_arch }}

      - name: Download WebView2 SDK
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = '1.0.2592.51'
          $dir = "windows\script\Microsoft.Web.WebView2.$version"
          $nupkg = "$dir\Microsoft.Web.WebView2.$version.nupkg"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          if (!(Test-Path "$dir\build\native\include\WebView2.h")) {
            $url = "https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2/$version"
            $ProgressPreference = 'SilentlyContinue'
            [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
            Invoke-WebRequest -Uri $url -OutFile $nupkg -UseBasicParsing
            Add-Type -AssemblyName System.IO.Compression.FileSystem
            [System.IO.Compression.ZipFile]::ExtractToDirectory($nupkg, $dir)
          }
          Get-Item "$dir\build\native\include\WebView2.h"

      - name: Build Windows native
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          @echo on
          setlocal enableextensions
          set "REPO_DIR=%CD%"
          set "BUILD_DIR=%REPO_DIR%\build"
          set "DLL_OUT=%REPO_DIR%\natives\${{ matrix.native_dir }}"
          set "WEBVIEW2_DIR=%REPO_DIR%\windows\script\Microsoft.Web.WebView2.1.0.2592.51"
          if not exist "%BUILD_DIR%" mkdir "%BUILD_DIR%"
          if not exist "%DLL_OUT%" mkdir "%DLL_OUT%"

          cl /nologo ^
              /D "WEBVIEW_API=__declspec(dllexport)" ^
              /I "%JAVA_HOME%\include" ^
              /I "%JAVA_HOME%\include\win32" ^
              /I "%REPO_DIR%\windows" ^
              /I "%WEBVIEW2_DIR%\build\native\include" ^
              /std:c++17 /EHsc ^
              /Fo"%BUILD_DIR%\\" ^
              "%REPO_DIR%\windows\webview.cc" ^
              "%REPO_DIR%\windows\webview_embed.cc" ^
              /link /DLL ^
              "%WEBVIEW2_DIR%\build\native\${{ matrix.wv2_arch }}\WebView2LoaderStatic.lib" ^
              "%JAVA_HOME%\lib\jawt.lib" ^
              advapi32.lib ole32.lib oleaut32.lib shlwapi.lib shell32.lib user32.lib version.lib winhttp.lib ^
              /OUT:"%BUILD_DIR%\webview.dll" || exit /b 1
          copy /Y "%BUILD_DIR%\webview.dll" "%DLL_OUT%\${{ matrix.lib_name }}"
          dir "%DLL_OUT%"

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.native_dir }}
          path: natives/${{ matrix.native_dir }}/${{ matrix.lib_name }}
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Deploy job: assemble all natives into src/<arch>/, set version from tag,
  # sign artifacts, and publish to Maven Central via the Central Publishing
  # Maven Plugin.  Only runs on v* tag pushes (and manual dispatch).
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Maven Central
    needs: native
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Determine release version
        shell: bash
        run: |
          if [[ "$GITHUB_REF_NAME" == v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-${GITHUB_SHA::7}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Release version: $VERSION"

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: liberica
          java-version: '11'
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          overwrite-settings: true

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: native-artifacts
          pattern: native-*

      - name: Lay natives into natives/<arch>/
        shell: bash
        run: |
          set -euo pipefail
          for d in native-artifacts/native-*; do
            arch="$(basename "$d" | sed 's/^native-//')"
            mkdir -p "natives/$arch"
            cp -v "$d"/* "natives/$arch/"
          done
          echo "--- final native layout ---"
          find natives -maxdepth 2 -type f \( -name '*.dylib' -o -name '*.so' -o -name '*.dll' \) | sort

      - name: Verify all 6 platforms are present
        shell: bash
        run: |
          set -euo pipefail
          required=(linux_64 linux_arm64 osx_64 osx_arm64 windows_64 windows_arm64)
          missing=()
          for arch in "${required[@]}"; do
            if ! compgen -G "natives/$arch/*" > /dev/null; then
              missing+=("$arch")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            echo "Refusing to publish: missing natives for ${missing[*]}" >&2
            exit 1
          fi
          echo "All 6 platforms present."

      - name: Import GPG key
        shell: bash
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_TTY: /dev/null
        run: |
          # --ignore-garbage tolerates trailing whitespace/CR from the secret;
          # printf avoids the trailing newline echo would add.
          printf '%s' "$GPG_PRIVATE_KEY" | base64 --decode --ignore-garbage | gpg --batch --import

      - name: Set Maven project version
        shell: bash
        run: |
          mvn versions:set \
            -DnewVersion="${{ env.VERSION }}" \
            -DprocessAllModules=true \
            -DgenerateBackupPoms=false \
            --batch-mode -ntp

      - name: Build and deploy
        shell: bash
        run: |
          mvn -B clean deploy \
            --batch-mode -ntp \
            -DskipTests \
            -Psign-artifacts \
            -Dgpg.passphrase="$GPG_PASSPHRASE"
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

      - name: Clean up GPG keys
        if: always()
        shell: bash
        run: |
          gpg --batch --yes --delete-secret-and-public-keys \
            $(gpg --list-secret-keys --keyid-format long | grep sec | awk '{print $2}' | cut -d'/' -f2) 2>/dev/null || true
          rm -rf ~/.gnupg
